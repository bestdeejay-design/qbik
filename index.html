  <!-- Splash -->
  <div id="splash" class="splash">
    <div class="splash-content">
      <div class="splash-logo">
        <svg class="splash-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      </div>
      <h1>Qbik</h1>
      <p class="tagline">Генератор глянцевых журналов</p>
    </div>
  </div>

  <!-- Landing -->
  <div id="landing" class="landing">
    <div class="landing-content">
      <div class="landing-header">
        <div class="logo-badge">
          <svg class="logo-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
          <span>Qbik</span>
        </div>
        <button class="theme-toggle-small" onclick="toggleTheme()">
          <svg class="icon-sm"><use href="#icon-sun"/></svg>
        </button>
      </div>

      <div class="landing-hero">
        <h1>Создайте свой<br>глянцевый журнал</h1>
        <p>Собирайте контент, выбирайте шаблоны, получайте готовый PDF для печати. Школьный журнал, городской, корпоративный — любой формат.</p>
      </div>

      <div class="features">
        <div class="feature"><svg class="icon"><use href="#icon-layout"/></svg><span>Шаблоны</span></div>
        <div class="feature"><svg class="icon"><use href="#icon-image"/></svg><span>Фото</span></div>
        <div class="feature"><svg class="icon"><use href="#icon-text"/></svg><span>Тексты</span></div>
        <div class="feature"><svg class="icon"><use href="#icon-download"/></svg><span>PDF</span></div>
      </div>

      <button class="btn-primary" onclick="openApp()" id="enterBtn">
        Создать журнал
        <svg class="icon"><use href="#icon-arrow"/></svg>
      </button>

      <p class="note">Qbik v1.0 &bull; Работает офлайн</p>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="page hidden">
    <div class="phone-frame">
      <div class="phone-header">
        <span class="status-bar"></span>
        <button class="theme-toggle-small" onclick="toggleTheme()">
          <svg class="icon-sm"><use href="#icon-sun"/></svg>
        </button>
      </div>

      <div class="app-header">
        <button class="back-btn hidden" onclick="goBack()" id="backBtn">
          <svg class="icon"><use href="#icon-arrow-left"/></svg>
        </button>
        <h2 id="appTitle">Мои журналы</h2>
        <div class="header-actions">
          <span id="headerTime" class="header-time"></span>
        </div>
      </div>

      <div class="app-content" id="content">
      </div>

      <div class="bottom-nav" id="bottomNav">
        <button class="nav-item active" onclick="showPage('projects', this)">
          <svg class="icon-nav"><use href="#icon-book"/></svg>
          <span>Проекты</span>
        </button>
        <button class="nav-item" onclick="showPage('editor', this)">
          <svg class="icon-nav"><use href="#icon-edit"/></svg>
          <span>Редактор</span>
        </button>
        <button class="nav-item" onclick="showPage('preview', this)">
          <svg class="icon-nav"><use href="#icon-eye"/></svg>
          <span>Превью</span>
        </button>
        <button class="nav-item" onclick="showPage('export', this)">
          <svg class="icon-nav"><use href="#icon-download"/></svg>
          <span>Экспорт</span>
        </button>
      </div>
    </div>

    <button class="btn-exit" onclick="closeApp()">На главную</button>
  </div>
